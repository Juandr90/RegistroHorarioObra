<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Registro Horario · Obra</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    --paper:#EDEAE3;
    --ink:#20242A;
    --ink-soft:#4B525C;
    --line:#C9C2B2;
    --yellow:#CC1F1F;
    --yellow-ink:#FFFFFF;
    --blue:#2E4A6B;
    --blue-soft:#5D7A9C;
    --rust:#B3401D;
    --green:#3B7A57;
    --white:#FAF9F5;
    --dropbox:#0061FE;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Archivo',sans-serif;
    color:var(--ink);
    background:
      linear-gradient(var(--line) 1px, transparent 1px) 0 0/100% 28px,
      var(--paper);
    background-attachment:local;
    min-height:100vh;
  }
  .app{max-width:880px;margin:0 auto;padding:0 0 60px;}

  /* ── header ── */
  .topbar{
    background:var(--ink);
    color:var(--white);
    padding:22px 24px 20px;
    border-bottom:6px solid var(--yellow);
  }
  .topbar .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--yellow);
    margin:0 0 4px;
  }
  .topbar h1{
    font-family:'Archivo Black',sans-serif;
    font-size:26px;
    margin:0;
    letter-spacing:.01em;
  }
  .topbar .status-line{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:#C9CED6;
    margin-top:8px;
    display:flex;align-items:center;gap:8px;
  }
  .status-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--ink-soft);
    display:inline-block;flex-shrink:0;
  }
  .status-dot.ok{background:#4CAF50;}
  .status-dot.syncing{background:#FF9800;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  /* ── nav ── */
  .nav{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    background:var(--white);
    border-bottom:2px solid var(--ink);
    position:sticky; top:0; z-index:10;
  }
  .nav button{
    font-family:'Archivo',sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:.02em;
    padding:14px 6px;
    border:none;
    border-right:1px solid var(--line);
    background:var(--white);
    color:var(--ink-soft);
    cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .nav button:last-child{border-right:none;}
  .nav button.active{background:var(--ink);color:var(--white);}

  .view{padding:26px 24px 10px;}

  /* ── cards ── */
  .card{
    background:var(--white);
    border:1px solid var(--line);
    box-shadow:3px 3px 0 rgba(32,36,42,.08);
    padding:22px;
    margin-bottom:20px;
  }
  .card h2{font-family:'Archivo Black',sans-serif;font-size:17px;margin:0 0 4px;}
  .card .sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);margin:0 0 18px;}

  /* ── form ── */
  label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-soft);
    margin-bottom:5px;
  }
  input[type=text], input[type=date], input[type=time], textarea{
    width:100%;height:42px;
    font-family:'IBM Plex Mono',monospace;font-size:14px;
    padding:0 10px;
    border:1.5px solid var(--ink);
    background:var(--white);color:var(--ink);
  }
  input[type=date]{min-width:0;}
  textarea{font-family:'Archivo',sans-serif;resize:vertical;min-height:56px;height:auto;padding:9px 10px;}
  input:focus,textarea:focus{outline:3px solid var(--yellow);outline-offset:0;}

  .row{display:grid;grid-template-columns:minmax(0,1fr);gap:14px;margin-bottom:14px;}
  .row.c2{grid-template-columns:minmax(0,1fr) minmax(0,1fr);}
  .row > div{min-width:0;}

  .shift-block{border-left:3px solid var(--blue);padding-left:14px;margin-bottom:16px;}
  .shift-block .shift-title{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--blue);
    text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .toggle-shift{
    background:none;border:1px solid var(--blue-soft);color:var(--blue);
    font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;cursor:pointer;
  }

  .jornada-preview{
    font-family:'IBM Plex Mono',monospace;
    background:var(--ink);color:var(--yellow);
    padding:12px 14px;font-size:20px;font-weight:700;
    display:flex;justify-content:space-between;align-items:center;
    margin:16px 0;
  }
  .jornada-preview .lbl{font-size:11px;color:#C9CED6;font-weight:400;text-transform:uppercase;letter-spacing:.08em;}

  /* ── buttons ── */
  .btn{
    font-family:'Archivo',sans-serif;font-weight:700;font-size:14px;
    padding:13px 20px;border:none;cursor:pointer;letter-spacing:.02em;
  }
  .btn-primary{background:var(--yellow);color:var(--yellow-ink);}
  .btn-primary:hover{background:#e02222;}
  .btn-primary:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed;}
  .btn-secondary{background:var(--white);color:var(--ink);border:1.5px solid var(--ink);}
  .btn-secondary:hover{background:var(--paper);}
  .btn-danger{background:var(--white);color:var(--rust);border:1.5px solid var(--rust);font-size:12px;padding:6px 10px;}
  .btn-dropbox{
    background:var(--dropbox);color:#fff;
    font-family:'Archivo',sans-serif;font-weight:700;font-size:14px;
    padding:13px 20px;border:none;cursor:pointer;
    display:inline-flex;align-items:center;gap:10px;
  }
  .btn-dropbox:hover{background:#0050d0;}
  .btn-block{width:100%;}

  /* ── stamp ── */
  .stamp-wrap{display:flex;justify-content:center;padding:20px 0 4px;}
  .stamp{
    font-family:'Archivo Black',sans-serif;color:var(--rust);
    border:4px solid var(--rust);border-radius:8px;
    padding:10px 22px;transform:rotate(-6deg);text-align:center;
    opacity:0;animation:stampIn .35s ease-out forwards;
  }
  .stamp .l1{font-size:20px;letter-spacing:.05em;}
  .stamp .l2{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;margin-top:2px;}
  @keyframes stampIn{
    0%{opacity:0;transform:rotate(-6deg) scale(1.6);}
    60%{opacity:1;}
    100%{opacity:1;transform:rotate(-6deg) scale(1);}
  }

  /* ── table ── */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    font-family:'IBM Plex Mono',monospace;font-size:10px;
    text-transform:uppercase;letter-spacing:.06em;
    text-align:left;padding:8px;background:var(--ink);color:var(--white);
    position:sticky;top:0;
  }
  td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top;}
  tr:nth-child(even) td{background:#F5F3EE;}
  .obs-cell{max-width:200px;color:var(--ink-soft);font-size:12.5px;}
  .empty-state{
    text-align:center;padding:50px 20px;color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;font-size:13px;
  }
  .table-scroll{overflow-x:auto;border:1px solid var(--line);}
  .row-actions{display:flex;gap:6px;}

  /* ── stat strip ── */
  .stat-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
  .stat{background:var(--white);border:1px solid var(--line);padding:14px;text-align:center;}
  .stat .n{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--blue);}
  .stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-top:2px;}

  /* ── dropbox panel ── */
  .dbx-connect-box{
    text-align:center;padding:40px 20px;
  }
  .dbx-connect-box .dbx-logo{
    font-family:'Archivo Black',sans-serif;font-size:36px;
    color:var(--dropbox);margin-bottom:12px;
  }
  .dbx-connect-box p{
    font-family:'IBM Plex Mono',monospace;font-size:13px;
    color:var(--ink-soft);margin:0 0 24px;line-height:1.6;
  }
  .dbx-file-list{list-style:none;padding:0;margin:0;}
  .dbx-file-list li{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 0;border-bottom:1px solid var(--line);
    font-family:'IBM Plex Mono',monospace;font-size:13px;
  }
  .dbx-file-list li:last-child{border-bottom:none;}
  .dbx-file-name{color:var(--blue);font-weight:600;}
  .dbx-file-size{color:var(--ink-soft);font-size:11px;}
  .dbx-status-ok{
    display:flex;align-items:center;gap:8px;
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--green);
    margin-bottom:18px;
  }
  .sync-info{
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    color:var(--ink-soft);margin-top:14px;line-height:1.6;
  }
  .sync-info strong{color:var(--ink);}
  .divider{border:none;border-top:1px solid var(--line);margin:18px 0;}
  .btn-danger-sm{
    background:none;border:none;color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;font-size:11px;
    cursor:pointer;text-decoration:underline;padding:0;
  }
  .btn-danger-sm:hover{color:var(--rust);}

  /* ── toast ── */
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--white);padding:12px 20px;
    font-family:'IBM Plex Mono',monospace;font-size:13px;
    box-shadow:0 4px 14px rgba(0,0,0,.25);
    opacity:0;transition:opacity .25s;
    z-index:100;border-left:4px solid var(--yellow);
    white-space:nowrap;
  }
  .toast.show{opacity:1;}

  @media(max-width:600px){
    .row.c2{grid-template-columns:1fr 1fr;}
    .nav button span{font-size:11px;}
    .stat-strip{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <p class="eyebrow">Registro Horario · Obra</p>
    <h1>Control de jornada</h1>
    <div class="status-line">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">No conectado a Dropbox</span>
    </div>
  </div>

  <div class="nav">
    <button data-view="fichar" class="active"><span>Fichar</span></button>
    <button data-view="consultar"><span>Consultar</span></button>
    <button data-view="dropbox"><span>Dropbox</span></button>
  </div>

  <div class="view" id="view-root"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─────────────────────────────────────────────
   CONFIG
───────────────────────────────────────────── */
const APP_KEY      = '2bs5ygxy2lwpvur';
const REDIRECT_URI = 'https://juandr90.github.io/RegistroHorarioObra/';
const DBX_FOLDER   = '/RegistroHorarioObra';
const STORAGE_KEY  = 'rho:entries';
const TOKEN_KEY    = 'rho:access_token';
const REFRESH_KEY  = 'rho:refresh_token';
const MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

/* ─────────────────────────────────────────────
   STATE
───────────────────────────────────────────── */
let entries      = [];
let currentView  = 'fichar';
let showSecondShift = false;
let currentFormDate = todayISO();
let isSyncing    = false;
let dbxConnected = false;

/* ─────────────────────────────────────────────
   UTILITIES
───────────────────────────────────────────── */
function pad(n){ return String(n).padStart(2,'0'); }

function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

function isoToSpanish(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function timeToMinutes(t){
  if(!t) return null;
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function minutesToHM(total){
  if(total==null||isNaN(total)) return {h:0,m:0};
  return {h:Math.floor(total/60), m:total%60};
}

function calcJornada(eM, sM, eT, sT){
  let total = 0;
  const a=timeToMinutes(eM), b=timeToMinutes(sM);
  if(a!=null&&b!=null&&b>a) total+=b-a;
  const c=timeToMinutes(eT), d=timeToMinutes(sT);
  if(c!=null&&d!=null&&d>c) total+=d-c;
  return minutesToHM(total);
}

function showToast(msg, duration=2400){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

function normalizeForFilename(name){
  return name.trim().toUpperCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^A-Z0-9]/g,'');
}

function getDropboxFilename(trabajador, fecha){
  const user = normalizeForFilename(trabajador);
  const mes  = MESES[parseInt(fecha.split('-')[1])-1];
  return `${user}_${mes}.xlsx`;
}

function getDropboxPath(trabajador, fecha){
  return `${DBX_FOLDER}/${getDropboxFilename(trabajador, fecha)}`;
}

/* ─────────────────────────────────────────────
   STATUS BAR
───────────────────────────────────────────── */
function updateStatusBar(){
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if(isSyncing){
    dot.className  = 'status-dot syncing';
    text.textContent = 'Sincronizando con Dropbox…';
  }else if(dbxConnected){
    dot.className  = 'status-dot ok';
    text.textContent = 'Conectado a Dropbox ✓';
  }else{
    dot.className  = 'status-dot';
    text.textContent = 'No conectado a Dropbox';
  }
}

/* ─────────────────────────────────────────────
   OAUTH PKCE HELPERS
───────────────────────────────────────────── */
async function sha256(plain){
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return crypto.subtle.digest('SHA-256', data);
}

function base64urlEncode(buffer){
  const bytes = new Uint8Array(buffer);
  let str = '';
  for(const b of bytes) str += String.fromCharCode(b);
  return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function generateCodeVerifier(){
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  return base64urlEncode(array);
}

async function generateCodeChallenge(verifier){
  const hash = await sha256(verifier);
  return base64urlEncode(hash);
}

/* ─────────────────────────────────────────────
   DROPBOX AUTH
───────────────────────────────────────────── */
async function connectDropbox(){
  const verifier   = generateCodeVerifier();
  const challenge  = await generateCodeChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);

  const params = new URLSearchParams({
    client_id:             APP_KEY,
    response_type:         'code',
    code_challenge:        challenge,
    code_challenge_method: 'S256',
    redirect_uri:          REDIRECT_URI,
    token_access_type:     'offline'
  });
  window.location.href = `https://www.dropbox.com/oauth2/authorize?${params}`;
}

async function handleOAuthCallback(){
  const params   = new URLSearchParams(window.location.search);
  const code     = params.get('code');
  const verifier = sessionStorage.getItem('pkce_verifier');
  if(!code || !verifier) return false;

  // Clean URL immediately
  history.replaceState({}, document.title, window.location.pathname);
  sessionStorage.removeItem('pkce_verifier');

  try{
    const body = new URLSearchParams({
      grant_type:    'authorization_code',
      code,
      redirect_uri:  REDIRECT_URI,
      client_id:     APP_KEY,
      code_verifier: verifier
    });
    const res  = await fetch('https://api.dropboxapi.com/oauth2/token', {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body
    });
    if(!res.ok) throw new Error('Token exchange failed');
    const data = await res.json();
    localStorage.setItem(TOKEN_KEY,   data.access_token);
    localStorage.setItem(REFRESH_KEY, data.refresh_token);
    dbxConnected = true;
    return true;
  }catch(e){
    console.error('OAuth error:', e);
    showToast('Error al conectar con Dropbox');
    return false;
  }
}

async function refreshAccessToken(){
  const refreshToken = localStorage.getItem(REFRESH_KEY);
  if(!refreshToken) return false;
  try{
    const body = new URLSearchParams({
      grant_type:    'refresh_token',
      refresh_token: refreshToken,
      client_id:     APP_KEY
    });
    const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body
    });
    if(!res.ok) return false;
    const data = await res.json();
    localStorage.setItem(TOKEN_KEY, data.access_token);
    dbxConnected = true;
    return true;
  }catch(e){
    return false;
  }
}

async function getToken(){
  return localStorage.getItem(TOKEN_KEY);
}

function disconnectDropbox(){
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(REFRESH_KEY);
  dbxConnected = false;
  updateStatusBar();
  render();
  showToast('Dropbox desconectado');
}

/* ─────────────────────────────────────────────
   DROPBOX FILE OPERATIONS
───────────────────────────────────────────── */
async function dbxRequest(url, options, retried=false){
  const token = await getToken();
  const res = await fetch(url, {
    ...options,
    headers:{ ...options.headers, 'Authorization': `Bearer ${token}` }
  });
  if(res.status===401 && !retried){
    const ok = await refreshAccessToken();
    if(ok) return dbxRequest(url, options, true);
    disconnectDropbox();
    throw new Error('Token expirado, reconecta Dropbox');
  }
  return res;
}

async function downloadFromDropbox(path){
  try{
    const res = await dbxRequest('https://content.dropboxapi.com/2/files/download', {
      method:'POST',
      headers:{ 'Dropbox-API-Arg': JSON.stringify({path}) }
    });
    if(res.status===409) return null; // archivo no existe aún
    if(!res.ok) throw new Error(`Download error: ${res.status}`);
    return await res.arrayBuffer();
  }catch(e){
    if(e.message.includes('not_found') || e.message.includes('409')) return null;
    throw e;
  }
}

async function uploadToDropbox(path, arrayBuffer){
  const res = await dbxRequest('https://content.dropboxapi.com/2/files/upload', {
    method:'POST',
    headers:{
      'Content-Type':   'application/octet-stream',
      'Dropbox-API-Arg': JSON.stringify({ path, mode:'overwrite', autorename:false, mute:true })
    },
    body: arrayBuffer
  });
  if(!res.ok) throw new Error(`Upload error: ${res.status}`);
  return res.json();
}

async function listDropboxFolder(){
  try{
    const res = await dbxRequest('https://api.dropboxapi.com/2/files/list_folder', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ path: DBX_FOLDER, recursive: false })
    });
    if(res.status===409) return []; // carpeta vacía o no existe
    if(!res.ok) return [];
    const data = await res.json();
    return (data.entries || []).filter(e=>e['.tag']==='file' && e.name.endsWith('.xlsx'));
  }catch(e){
    return [];
  }
}

async function downloadFromDropboxByName(filename){
  const token = await getToken();
  const path = `${DBX_FOLDER}/${filename}`;
  const res = await fetch('https://content.dropboxapi.com/2/files/download', {
    method:'POST',
    headers:{
      'Authorization':   `Bearer ${token}`,
      'Dropbox-API-Arg': JSON.stringify({path})
    }
  });
  if(!res.ok) throw new Error('No se pudo descargar');
  const blob = await res.blob();
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* ─────────────────────────────────────────────
   EXCEL BUILD / PARSE
───────────────────────────────────────────── */
function buildHeaderRows(){
  return [
    ['','','Horario','','','','','','','','Jornada','','Trabajadores','','Partidas',''],
    ['Dia','Obra','Entrada','','Salida','','Entrada','','Salida','','Horas','Minutos','Grupo/GB','Subcontrata','','Observaciones']
  ];
}

function entryToRow(e){
  const [eh,em] = (e.entradaM||'0:0').split(':').map(Number);
  const [sh,sm] = (e.salidaM ||'0:0').split(':').map(Number);
  const eT = e.entradaT ? e.entradaT.split(':').map(Number) : ['',''];
  const sT = e.salidaT  ? e.salidaT.split(':').map(Number)  : ['',''];
  return [
    isoToSpanish(e.fecha), e.obra,
    eh, em, sh, sm,
    eT[0], eT[1], sT[0], sT[1],
    e.horas, e.minutos,
    e.trabajador, e.subcontrata||'', '', e.observaciones||''
  ];
}

function buildWorkbookBuffer(dataRows){
  const aoa = [...buildHeaderRows(), ...dataRows];
  const ws  = XLSX.utils.aoa_to_sheet(aoa);
  ws['!merges'] = [
    {s:{r:0,c:2},e:{r:0,c:9}},
    {s:{r:0,c:10},e:{r:0,c:11}},
    {s:{r:0,c:12},e:{r:0,c:13}},
    {s:{r:0,c:14},e:{r:0,c:15}},
    {s:{r:1,c:2},e:{r:1,c:3}},
    {s:{r:1,c:4},e:{r:1,c:5}},
    {s:{r:1,c:6},e:{r:1,c:7}},
    {s:{r:1,c:8},e:{r:1,c:9}},
  ];
  ws['!cols'] = [
    {wch:11},{wch:16},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},
    {wch:7},{wch:8},{wch:20},{wch:14},{wch:9},{wch:38}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Hoja1');
  return XLSX.write(wb, {type:'array', bookType:'xlsx'});
}

function parseWorkbookRows(arrayBuffer){
  try{
    const wb = XLSX.read(arrayBuffer, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const aoa = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    return aoa.slice(2); // skip 2 header rows
  }catch(e){
    return [];
  }
}

/* ─────────────────────────────────────────────
   SYNC TO DROPBOX
───────────────────────────────────────────── */
async function syncEntryToDropbox(entry){
  if(!dbxConnected) return;
  isSyncing = true;
  updateStatusBar();
  try{
    const path = getDropboxPath(entry.trabajador, entry.fecha);
    // Descarga el archivo existente (si existe)
    let existingRows = [];
    const existing = await downloadFromDropbox(path);
    if(existing) existingRows = parseWorkbookRows(existing);

    // Añade la nueva fila
    const newRow = entryToRow(entry);
    existingRows.push(newRow);

    // Sube el archivo actualizado
    const buffer = buildWorkbookBuffer(existingRows);
    await uploadToDropbox(path, buffer);
    showToast(`Guardado en Dropbox: ${getDropboxFilename(entry.trabajador, entry.fecha)}`);
  }catch(e){
    console.error('Dropbox sync error:', e);
    showToast('Fichaje guardado localmente (error Dropbox)');
  }finally{
    isSyncing = false;
    updateStatusBar();
  }
}

/* ─────────────────────────────────────────────
   LOCAL STORAGE
───────────────────────────────────────────── */
async function loadEntries(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : [];
  }catch(e){ entries = []; }
}

async function persistEntries(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    return true;
  }catch(e){ return false; }
}

/* ─────────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────────── */
function switchView(v){
  currentView = v;
  document.querySelectorAll('.nav button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===v);
  });
  render();
}

function attachFormHandlers(){
  const entradaM  = document.getElementById('f-entradaM');
  const salidaM   = document.getElementById('f-salidaM');
  const entradaT  = document.getElementById('f-entradaT');
  const salidaT   = document.getElementById('f-salidaT');
  const jornadaOut= document.getElementById('jornada-out');
  const toggleBtn = document.getElementById('btn-toggle-shift');
  const fechaInput= document.getElementById('f-fecha');

  function updateJornada(){
    const r = calcJornada(entradaM.value, salidaM.value,
      entradaT ? entradaT.value : null, salidaT ? salidaT.value : null);
    jornadaOut.textContent = `${r.h}h ${pad(r.m)}m`;
  }
  [entradaM, salidaM, entradaT, salidaT].forEach(el=>{
    if(el) el.addEventListener('input', updateJornada);
  });
  updateJornada();

  fechaInput.addEventListener('input', ()=>{ currentFormDate = fechaInput.value; });

  toggleBtn.addEventListener('click', ()=>{
    showSecondShift = !showSecondShift;
    document.getElementById('shift-tarde-wrap').style.display = showSecondShift ? '' : 'none';
    toggleBtn.textContent = showSecondShift ? '– quitar segundo turno' : '+ añadir segundo turno';
    updateJornada();
  });

  document.getElementById('btn-fichar').addEventListener('click', async ()=>{
    const fecha       = document.getElementById('f-fecha').value;
    const trabajador  = document.getElementById('f-trabajador').value.trim();
    const obra        = document.getElementById('f-obra').value.trim();

    if(!fecha)      { showToast('Falta la fecha'); return; }
    if(!trabajador) { showToast('Falta el nombre del trabajador'); return; }
    if(!obra)       { showToast('Falta el nombre de la obra'); return; }
    if(!entradaM.value || !salidaM.value){ showToast('Falta la hora de entrada o salida'); return; }

    const r = calcJornada(entradaM.value, salidaM.value,
      entradaT ? entradaT.value : null, salidaT ? salidaT.value : null);

    const entry = {
      id:           Date.now(),
      fecha,
      trabajador,
      obra,
      entradaM:     entradaM.value,
      salidaM:      salidaM.value,
      entradaT:     entradaT ? entradaT.value : '',
      salidaT:      salidaT  ? salidaT.value  : '',
      horas:        r.h,
      minutos:      r.m,
      subcontrata:  document.getElementById('f-subcontrata').value.trim(),
      partidas:     document.getElementById('f-partidas').value.trim(),
      observaciones:document.getElementById('f-observaciones').value.trim()
    };

    entries.push(entry);
    await persistEntries();

    // Sello visual
    const stampWrap = document.getElementById('stamp-wrap');
    stampWrap.innerHTML = `<div class="stamp"><div class="l1">FICHADO</div><div class="l2">${isoToSpanish(fecha)} · ${r.h}h ${pad(r.m)}m</div></div>`;

    if(dbxConnected){
      showToast('Sincronizando con Dropbox…');
      await syncEntryToDropbox(entry);
    }else{
      showToast('Guardado localmente (conecta Dropbox para sincronizar)');
    }

    // Reset formulario
    currentFormDate = todayISO();
    showSecondShift = false;
    ['f-obra','f-entradaM','f-salidaM','f-entradaT','f-salidaT','f-subcontrata','f-partidas','f-observaciones']
      .forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
    document.getElementById('f-fecha').value = currentFormDate;
    document.getElementById('f-trabajador').value = trabajador; // mantiene el trabajador
    document.getElementById('shift-tarde-wrap').style.display = 'none';
    toggleBtn.textContent = '+ añadir segundo turno';
    updateJornada();
  });
}

function consultarTemplate(){
  if(entries.length===0){
    return `<div class="card"><div class="empty-state">Todavía no hay jornadas registradas.<br>Ficha tu primer día desde "Fichar".</div></div>`;
  }
  const sorted   = [...entries].sort((a,b)=>a.fecha<b.fecha?1:-1);
  const totalMin = entries.reduce((acc,e)=>acc+e.horas*60+e.minutos,0);
  const totalHM  = minutesToHM(totalMin);
  const obras    = new Set(entries.map(e=>e.obra)).size;
  const trabaj   = new Set(entries.map(e=>e.trabajador)).size;

  const rows = sorted.map(e=>`
    <tr>
      <td>${isoToSpanish(e.fecha)}</td>
      <td><strong>${e.trabajador}</strong></td>
      <td>${e.obra}</td>
      <td>${e.entradaM||'–'}</td>
      <td>${e.salidaM||'–'}</td>
      <td>${e.entradaT||'–'}</td>
      <td>${e.salidaT||'–'}</td>
      <td>${e.horas}h ${pad(e.minutos)}m</td>
      <td>${e.subcontrata||'–'}</td>
      <td class="obs-cell">${e.observaciones||'–'}</td>
      <td class="row-actions"><button class="btn-danger" data-del="${e.id}">Borrar</button></td>
    </tr>`).join('');

  return `
  <div class="stat-strip">
    <div class="stat"><div class="n">${entries.length}</div><div class="l">Jornadas</div></div>
    <div class="stat"><div class="n">${totalHM.h}h ${pad(totalHM.m)}m</div><div class="l">Horas totales</div></div>
    <div class="stat"><div class="n">${trabaj}</div><div class="l">Trabajadores</div></div>
  </div>
  <div class="card">
    <h2>Consultar jornadas</h2>
    <p class="sub">${entries.length} registro(s) en este dispositivo, más reciente primero.</p>
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th>Día</th><th>Trabajador</th><th>Obra</th>
          <th>Ent. M</th><th>Sal. M</th><th>Ent. T</th><th>Sal. T</th>
          <th>Jornada</th><th>Subcontrata</th><th>Observaciones</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function dropboxTemplate(files){
  if(!dbxConnected){
    return `
    <div class="card">
      <div class="dbx-connect-box">
        <div class="dbx-logo">⬡ Dropbox</div>
        <p>Conecta con Dropbox para que cada fichaje se guarde automáticamente en la carpeta compartida.<br><br>
        El archivo se llamará <strong>USUARIO_MES.xlsx</strong><br>
        (por ejemplo: <strong>JUANDURAN_JUL.xlsx</strong>)</p>
        <button class="btn-dropbox btn-block" id="btn-connect-dbx">
          Conectar con Dropbox
        </button>
      </div>
    </div>`;
  }

  const fileItems = files.length===0
    ? '<li style="color:var(--ink-soft);font-family:\'IBM Plex Mono\',monospace;font-size:13px;padding:16px 0;">Aún no hay archivos en la carpeta.</li>'
    : files.map(f=>`
        <li>
          <span class="dbx-file-name">${f.name}</span>

          <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px;" data-dl="${f.name}">Descargar</button>

  <div class="card">
    <div class="dbx-status-ok">

      Conectado a Dropbox
    </div>
    <h2>Archivos en Dropbox</h2>
    <p class="sub">Carpeta: <strong>${DBX_FOLDER}/</strong> · Los fichajes se guardan aquí automáticamente.</p>
    <ul class="dbx-file-list">${fileItems}</ul>
    <hr class="divider">
    <div class="sync-info">
      Formato: <strong>USUARIO_MES.xlsx</strong> &nbsp;·&nbsp; Un archivo por trabajador y mes<br>
      Los archivos se actualizan en Dropbox cada vez que se ficha.
    </div>
    <hr class="divider">
    <button class="btn-danger-sm" id="btn-disconnect">Desconectar Dropbox</button>
  </div>`;
}

/* ─────────────────────────────────────────────
   RENDER
───────────────────────────────────────────── */
async function render(){
  const root = document.getElementById('view-root');

  if(currentView==='fichar'){
    root.innerHTML = formTemplate();
    attachFormHandlers();

  }else if(currentView==='consultar'){
    root.innerHTML = consultarTemplate();
    root.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const id = Number(btn.dataset.del);
        entries  = entries.filter(e=>e.id!==id);
        await persistEntries();
        showToast('Registro borrado (solo local)');
        render();
      });
    });

  }else if(currentView==='dropbox'){
    let files = [];
    if(dbxConnected){
      root.innerHTML = `<div class="card"><div class="empty-state">Cargando archivos…</div></div>`;
      files = await listDropboxFolder();
    }
    root.innerHTML = dropboxTemplate(files);

    const connectBtn = document.getElementById('btn-connect-dbx');
    if(connectBtn) connectBtn.addEventListener('click', connectDropbox);

    const disconnectBtn = document.getElementById('btn-disconnect');
    if(disconnectBtn) disconnectBtn.addEventListener('click', ()=>{
      if(confirm('¿Desconectar Dropbox? Los fichajes ya guardados en la nube no se borran.')) disconnectDropbox();
    });

    root.querySelectorAll('[data-dl]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        btn.textContent = 'Descargando…';
        btn.disabled = true;
        try{
          await downloadFromDropboxByName(btn.dataset.dl);
        }catch(e){
          showToast('Error al descargar el archivo');
        }finally{
          btn.textContent = 'Descargar';
          btn.disabled = false;
        }
      });
    });
  }
}

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
document.querySelectorAll('.nav button').forEach(b=>{
  b.addEventListener('click', ()=>switchView(b.dataset.view));
});

(async function init(){
  await loadEntries();

  // ¿Venimos del callback OAuth?
  const callbackOk = await handleOAuthCallback();

  // ¿Tenemos token guardado?
  if(!callbackOk){
    const token   = localStorage.getItem(TOKEN_KEY);
    const refresh = localStorage.getItem(REFRESH_KEY);
    if(token && refresh){
      dbxConnected = true;
    }
  }

  updateStatusBar();
  render();

  if(callbackOk){
    showToast('¡Dropbox conectado correctamente!', 3000);
  }
})();
</script>
